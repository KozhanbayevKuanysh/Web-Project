<div class="register-container">
  <div class="register-card">

    <div class="register-logo"></div>
    <h2>Create account</h2>
    <p>Start building better habits today</p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="Choose a username"
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="At least 8 characters"
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          placeholder="Repeat your password"
          [disabled]="isLoading"
        />
      </div>

      <!-- Password match indicator -->
      <div class="match-hint" *ngIf="password && confirmPassword">
        <span class="match-ok" *ngIf="password === confirmPassword">✓ Passwords match</span>
        <span class="match-no" *ngIf="password !== confirmPassword">✗ Passwords do not match</span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <button
        type="submit"
        class="register-button"
        [disabled]="isLoading || !username || !password || !confirmPassword"
      >
        <span *ngIf="!isLoading">Create account</span>
        <span *ngIf="isLoading">Creating account...</span>
      </button>

    </form>

    <div class="divider"><span>or</span></div>

    <div class="login-link">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>

  </div>
</div>
